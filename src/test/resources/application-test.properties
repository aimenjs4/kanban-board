# H2 In-Memory Datenbank fuer Tests (kein PostgreSQL, kein Keycloak noetig)
spring.datasource.url=jdbc:h2:mem:kanban-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# jwk-set-uri direkt angeben damit Spring nicht den Keycloak Discovery-Endpoint aufruft
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/kanban-board/protocol/openid-connect/certs
